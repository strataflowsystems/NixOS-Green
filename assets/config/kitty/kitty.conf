# Hermes Code / Iridiscent green Kitty profile

font_family Hack
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0
adjust_line_height 102%
adjust_column_width 100%

disable_ligatures never
text_composition_strategy platform
box_drawing_scale 0.001, 1, 1.5, 2

background #010a06
foreground #71f79f
selection_background #164f20
selection_foreground #000000
url_color #71f79f

cursor #3dd425
cursor_text_color #000000
cursor_shape beam
cursor_beam_thickness 2
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

active_border_color #3dd425
inactive_border_color #0e3816
bell_border_color #ff6a00
visual_bell_color #0e3816

# ANSI palette: dark terminal greens with cyan diagnostics and warm warnings.
color0  #010a06
color1  #ff4f64
color2  #3dd425
color3  #d6ff4f
color4  #46e46a
color5  #7f6bff
color6  #00e5a8
color7  #c8ffd0
color8  #175418
color9  #ff7a8a
color10 #71f79f
color11 #ecff8f
color12 #9cffad
color13 #a5ffd0
color14 #6fffdc
color15 #f0fff2

background_opacity 0.84
dynamic_background_opacity yes
background_blur 18
dim_opacity 0.66
inactive_text_alpha 0.72

window_padding_width 10
single_window_margin_width 0
window_margin_width 0
window_border_width 1pt
draw_minimal_borders yes
placement_strategy center
remember_window_size yes
initial_window_width 112c
initial_window_height 34c
confirm_os_window_close 0
linux_display_server auto
hide_window_decorations no

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_bar_background #010a06
tab_title_template "{fmt.fg._175418}{fmt.bg._175418}{fmt.fg._71f79f} {index}:{title[:28]} {fmt.bg.default}{fmt.fg._175418}"
active_tab_title_template "{fmt.fg._3dd425}{fmt.bg._3dd425}{fmt.fg._000000} {index}:{title[:32]} {fmt.bg.default}{fmt.fg._3dd425}"
active_tab_background #3dd425
active_tab_foreground #000000
inactive_tab_background #011209
inactive_tab_foreground #71f79f
tab_bar_margin_width 2
tab_separator " "
active_tab_font_style bold
inactive_tab_font_style normal
tab_activity_symbol "•"

mark1_foreground #000000
mark1_background #3dd425
mark2_foreground #000000
mark2_background #46e46a
mark3_foreground #000000
mark3_background #ff6a00

scrollback_lines 20000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 2.0
mouse_hide_wait 1.5
detect_urls yes
underline_hyperlinks always
open_url_with default

copy_on_select clipboard
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08
window_alert_on_bell yes
command_on_bell none

shell_integration enabled
allow_remote_control socket-only
listen_on unix:/tmp/kitty-hermes-theme

enabled_layouts splits,stack,tall,fat,grid
resize_debounce_time 0.05
repaint_delay 8
input_delay 1
sync_to_monitor yes

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+q close_tab
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right
map ctrl+shift+backslash launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current
map ctrl+shift+r start_resizing_window
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+f show_scrollback
map ctrl+shift+u kitten unicode_input
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+underscore change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
