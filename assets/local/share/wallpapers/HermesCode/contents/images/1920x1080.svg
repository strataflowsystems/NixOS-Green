  </g>
  <g font-family="Hack, monospace" font-size="26" fill="#3dd425" opacity="0.86" filter="url(#soft-glow)">
    <text x="188" y="214">&gt; systemctl --user status hermes</text>
    <text x="188" y="270" opacity="0.66">[ ok ] plasma.shell: theme=Iridiscent-round</text>
    <text x="188" y="326" opacity="0.52">[ env ] accent=#3dd425 prompt='&gt;_'</text>
  </g>
  <g font-family="Hack, monospace" font-size="20" fill="#71f79f" opacity="0.34">
    <text x="1134" y="218">const palette = { accent: '#3dd425', bg: '#011209' };</text>
    <text x="1134" y="268">watch('/plasma/theme').on('change', reloadShell);</text>
    <text x="1134" y="318">render(panel).with({ blur: 0.18, grid: true });</text>
    <text x="1134" y="368">focus(item).border('1px solid #64fe54');</text>
  </g>
  <g opacity="0.25">
    <rect x="168" y="136" width="676" height="408" rx="2" fill="#011209" stroke="#3dd425" stroke-width="1"/>
    <rect x="1104" y="136" width="672" height="270" rx="2" fill="#011209" stroke="#3dd425" stroke-width="1"/>
    <rect x="1264" y="602" width="512" height="276" rx="2" fill="#011209" stroke="#3dd425" stroke-width="1"/>
  </g>
  <g fill="#3dd425" opacity="0.16">
    <rect x="220" y="410" width="220" height="8"/>
    <rect x="220" y="444" width="420" height="8"/>
    <rect x="220" y="478" width="310" height="8"/>
    <rect x="1310" y="660" width="370" height="7"/>
