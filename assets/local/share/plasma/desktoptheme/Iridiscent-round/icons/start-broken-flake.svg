<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="54" height="32" viewBox="0 0 54 32">
  <defs>
    <style id="current-color-scheme" type="text/css">
      .ColorScheme-Text { color:#3dd425; }
    </style>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="flake-arm">
      <path d="M 0,-8 L 2.15,-4.35 L 6.35,-4.2 L 4.1,-0.65 L 6.35,2.9 L 2.15,2.75 L 0,6.4 L -2.15,2.75 L -6.35,2.9 L -4.1,-0.65 L -6.35,-4.2 L -2.15,-4.35 Z"/>
    </g>
    <g id="flake">
      <circle cx="0" cy="0" r="2.4"/>
      <use href="#flake-arm" transform="translate(0,-8)"/>
      <use href="#flake-arm" transform="rotate(60) translate(0,-8)"/>
      <use href="#flake-arm" transform="rotate(120) translate(0,-8)"/>
      <use href="#flake-arm" transform="rotate(180) translate(0,-8)"/>
      <use href="#flake-arm" transform="rotate(240) translate(0,-8)"/>
      <use href="#flake-arm" transform="rotate(300) translate(0,-8)"/>
    </g>
  </defs>

  <g id="16-16-start-here-kde" transform="translate(0,16)">
    <rect x="0.5" y="0.5" width="15" height="15" rx="1.5" fill="#011209" stroke="#3dd425" stroke-width="1"/>
    <use href="#flake" transform="translate(8,8) scale(0.48)" fill="#3dd425" filter="url(#glow)"/>
  </g>

  <g id="22-22-start-here-kde" transform="translate(16,10)">
    <rect x="0.5" y="0.5" width="21" height="21" rx="2" fill="#011209" stroke="#3dd425" stroke-width="1"/>
    <use href="#flake" transform="translate(11,11) scale(0.68)" fill="#3dd425" filter="url(#glow)"/>
  </g>

  <g id="start-here-kde" transform="translate(28,0)">
    <rect x="0.5" y="0.5" width="31" height="31" rx="2" fill="#011209" stroke="#3dd425" stroke-width="1.2"/>
    <use href="#flake" transform="translate(16,16) scale(1.02)" fill="#3dd425" filter="url(#glow)"/>
  </g>
</svg>
